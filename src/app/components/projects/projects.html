<div class="container text-center">
    <h2 class="mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-code-slash" viewBox="0 2 16 16">
            <path d="M10.478 1.647a.5.5 0 1 0-.956-.294l-4 13a.5.5 0 0 0 .956.294zM4.854 4.146a.5.5 0 0 1 0 .708L1.707 8l3.147 3.146a.5.5 0 0 1-.708.708l-3.5-3.5a.5.5 0 0 1 0-.708l3.5-3.5a.5.5 0 0 1 .708 0m6.292 0a.5.5 0 0 0 0 .708L14.293 8l-3.147 3.146a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 0 0-.708 0"/>
        </svg>
        Ultimos Proyectos:
    </h2>
    <section>
        @for(project of projects(); track project.name){
            <div class="d-flex mb-3 project-box">
                <img class="project-img" src="{{project.img}}" alt="{{project.name}}-image">
                <div>
                    <div class="project-info-box text-start p-4">
                        <h4>{{project.name}}</h4>
                        <p>{{project.description}}</p>
                    </div>
                    <div class="tecnologias-box mb-3">
                        @for(tech of project.stack; track tech){
                            <span class="badge rounded-pill me-2">{{tech.name}}</span>
                        }
                    </div>
                    @if(project.link !== '#') {
                        <div class="link">
                            <a [href]="project.link" target="_blank" class="">
                                <img src="icons/github.svg" alt="GitHub icon" width="18" height="18" class="me-1">
                                Ver Proyecto
                            </a>
                        </div>
                    }@else {
                        <div class="link">
                            <a class="disabled-link">
                                En Desarrollo
                            </a>
                        </div>
                    }
                    
                </div>

            </div>
        }
    </section>
</div>
